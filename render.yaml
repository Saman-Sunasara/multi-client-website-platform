services:
  - type: web
    name: saas-platform-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # You'll set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # You'll set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL after deploying frontend
